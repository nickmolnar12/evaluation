<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VALEX — Equity Valuation Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0a0a0f; --surface:#111118; --surface2:#17171f; --border:#2a2a3a;
  --accent:#e8ff47; --accent2:#47c8ff; --accent4:#a78bfa;
  --text:#f0f0f8; --muted:#6b6b8a; --green:#4ade80; --red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;}
a{color:var(--accent2);}

.app{max-width:1300px;margin:0 auto;padding:0 24px 80px;}

/* HEADER */
.header{padding:36px 0 28px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--accent);display:inline;}
.logo span{color:var(--text);}
.tagline{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.search-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
#tickerInput{
  background:var(--surface);border:1px solid var(--border);color:var(--text);
  font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  padding:12px 18px;outline:none;width:180px;transition:border-color .2s;
}
#tickerInput:focus{border-color:var(--accent);}
#tickerInput::placeholder{color:var(--muted);font-size:14px;letter-spacing:1px;}
#analyzeBtn{
  background:var(--accent);color:#0a0a0f;border:none;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:12px 28px;cursor:pointer;transition:opacity .2s;
}
#analyzeBtn:hover{opacity:.85;}
#analyzeBtn:disabled{opacity:.4;cursor:not-allowed;}

/* STATUS */
.status{padding:10px 14px;font-size:12px;margin-bottom:20px;letter-spacing:1px;border-left:3px solid var(--accent2);color:var(--accent2);background:var(--surface);}
.status.err{border-color:var(--red);color:var(--red);}
.status.warn{border-color:#fbbf24;color:#fbbf24;}
.hidden{display:none!important;}

/* COMPANY HEADER */
.co-header{
  background:var(--surface);border:1px solid var(--border);
  padding:20px 24px;margin-bottom:20px;
  display:flex;align-items:center;gap:32px;flex-wrap:wrap;
}
.co-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;}
.co-meta{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.price-block{margin-left:auto;text-align:right;}
.cur-price{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--accent);}
.price-chg{font-size:12px;margin-top:2px;}
.up{color:var(--green);} .dn{color:var(--red);}

/* PILLS */
.pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.pill{background:var(--surface);border:1px solid var(--border);padding:10px 16px;flex:1;min-width:120px;}
.pill-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.pill-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.ca{color:var(--accent);} .ca2{color:var(--accent2);} .ca4{color:var(--accent4);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;}
.tab{
  padding:11px 22px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;
  border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* PANELS */
.panel{display:none;} .panel.active{display:block;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
@media(max-width:860px){.g2,.g3{grid-template-columns:1fr;}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);padding:20px 22px;margin-bottom:18px;}
.card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

/* TABLE */
.dt{width:100%;border-collapse:collapse;}
.dt th{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);}
.dt td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(42,42,58,.4);}
.dt tr:last-child td{border-bottom:none;}
.dt .nr{text-align:right;font-family:'DM Mono',monospace;}
.dt .lb{color:var(--muted);font-size:11px;}
.dt .hl td{color:var(--accent);font-weight:600;}

/* VAL RESULT */
.vr{background:var(--surface2);border:1px solid var(--border);padding:18px 22px;margin-top:14px;}
.vr-lbl{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.vr-price{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--accent);line-height:1;}
.vr-sub{font-size:13px;margin-top:6px;color:var(--muted);}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-radius:2px;}
.bg{background:rgba(74,222,128,.15);color:var(--green);}
.br{background:rgba(248,113,113,.15);color:var(--red);}
.by{background:rgba(251,191,36,.15);color:#fbbf24;}
.bb{background:rgba(71,200,255,.15);color:var(--accent2);}

/* ASSUMPTION */
.asgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.asfield label{display:block;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.asfield input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;padding:7px 10px;outline:none;transition:border-color .2s;}
.asfield input:focus{border-color:var(--accent);}

/* SVG CHARTS */
.chart-svg{width:100%;overflow:visible;}
.chart-wrap{width:100%;margin-top:6px;}
.bar-fill{opacity:.85;transition:opacity .2s;}
.bar-fill:hover{opacity:1;}
.axis-line{stroke:var(--border);stroke-width:1;}
.axis-label{fill:var(--muted);font-size:10px;font-family:'DM Mono',monospace;}
.grid-line{stroke:var(--border);stroke-width:1;stroke-dasharray:3,3;}

/* GAUGE */
.gauge-wrap{margin-bottom:12px;}
.gauge-track{height:5px;background:var(--border);border-radius:3px;margin-top:5px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.gauge-row{display:flex;justify-content:space-between;font-size:11px;}

/* SPINNER */
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:40px;opacity:.2;margin-bottom:14px;}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;opacity:.3;margin-bottom:6px;color:var(--text);}
.empty-sub{font-size:12px;}

.note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.7;}
.divider{height:1px;background:var(--border);margin:16px 0;}
.sec-title{font-size:10px;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div><span class="logo">VALE<span>X</span></span></div>
    <div class="tagline">Equity Valuation Dashboard · Yahoo Finance Data</div>
    <div class="search-row">
      <input id="tickerInput" placeholder="TICKER" maxlength="10" autocomplete="off" spellcheck="false"/>
      <button id="analyzeBtn" onclick="analyze()">ANALYSE →</button>
    </div>
  </header>

  <div id="statusBar" class="status hidden"></div>

  <!-- EMPTY STATE -->
  <div id="emptyState" class="empty">
    <div class="empty-icon">◈</div>
    <div class="empty-title">Enter a ticker to begin</div>
    <div class="empty-sub">Any US-listed equity — e.g. AAPL, MSFT, TSLA, JPM, KO</div>
  </div>

  <!-- RESULTS (hidden until data loads) -->
  <div id="results" class="hidden">
    <div id="coHeader" class="co-header"></div>
    <div id="pills" class="pills"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab" onclick="switchTab('dcf',this)">DCF</button>
      <button class="tab" onclick="switchTab('comps',this)">Comps</button>
      <button class="tab" onclick="switchTab('ddm',this)">DDM</button>
      <button class="tab" onclick="switchTab('assets',this)">Asset-Based</button>
    </div>
    <div id="tab-overview" class="panel active"></div>
    <div id="tab-dcf"      class="panel"></div>
    <div id="tab-comps"    class="panel"></div>
    <div id="tab-ddm"      class="panel"></div>
    <div id="tab-assets"   class="panel"></div>
  </div>

</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let D = null; // current stock data
let A = { wacc:10, g1:15, g2:8, gt:2.5, y1:5, ke:10, dg:4 };

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmt2  = n => (n==null||isNaN(n)) ? 'N/A' : (+n).toFixed(2);
const fmtB  = n => {
  if(n==null||isNaN(n)) return 'N/A';
  const a=Math.abs(n);
  if(a>=1e12) return (n/1e12).toFixed(2)+'T';
  if(a>=1e9)  return (n/1e9).toFixed(2)+'B';
  if(a>=1e6)  return (n/1e6).toFixed(2)+'M';
  return (+n).toFixed(0);
};
const fmtP  = n => (n==null||isNaN(n)) ? 'N/A' : '$'+(+n).toFixed(2);
const fmtPct= n => (n==null||isNaN(n)) ? 'N/A' : ((+n)*100).toFixed(1)+'%';
const fmtMx = n => (n==null||isNaN(n)||!isFinite(n)) ? 'N/A' : (+n).toFixed(1)+'x';
const safe  = (o,k) => o?.[k]?.raw ?? null;

function upsideBadge(iv, price){
  if(!iv||!price) return '';
  const u=(iv-price)/price*100;
  if(u>10)  return `<span class="badge bg">+${u.toFixed(1)}% UPSIDE</span>`;
  if(u<-10) return `<span class="badge br">${u.toFixed(1)}% DOWNSIDE</span>`;
  return `<span class="badge by">${u.toFixed(1)}% FAIRLY VALUED</span>`;
}

// ── FETCH ─────────────────────────────────────────────────────────────────────
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

async function tryFetch(url){
  for(const proxy of PROXIES){
    try{
      const r = await fetch(proxy(url), {signal: AbortSignal.timeout(10000)});
      if(!r.ok) continue;
      const j = await r.json();
      if(j?.quoteSummary?.result) return j;
    } catch(e){ continue; }
  }
  throw new Error('All proxies failed — Yahoo Finance may be rate-limiting. Please wait 30s and retry.');
}

async function fetchStock(ticker){
  const t = ticker.toUpperCase();
  const base = 'https://query1.finance.yahoo.com/v10/finance/quoteSummary/'+t;

  const [q1,q2,q3,q4] = await Promise.all([
    tryFetch(base+'?modules=summaryDetail,defaultKeyStatistics,financialData,price,assetProfile'),
    tryFetch(base+'?modules=cashflowStatementHistory'),
    tryFetch(base+'?modules=balanceSheetHistory'),
    tryFetch(base+'?modules=incomeStatementHistory'),
  ]);

  const r = q1.quoteSummary.result[0];
  if(!r) throw new Error('Ticker not found.');

  const pr=r.price||{}, fin=r.financialData||{}, ks=r.defaultKeyStatistics||{}, sd=r.summaryDetail||{}, ap=r.assetProfile||{};
  const cf=q2.quoteSummary.result[0]?.cashflowStatementHistory?.cashflowStatements||[];
  const bs=q3.quoteSummary.result[0]?.balanceSheetHistory?.balanceSheetStatements||[];
  const is=q4.quoteSummary.result[0]?.incomeStatementHistory?.incomeStatementHistory||[];

  return {
    ticker:t, name:pr.longName||pr.shortName||t,
    sector:ap.sector||'N/A', industry:ap.industry||'N/A',
    price:safe(pr,'regularMarketPrice'), change:safe(pr,'regularMarketChange'),
    changePct:safe(pr,'regularMarketChangePercent'),
    marketCap:safe(pr,'marketCap'), ev:safe(ks,'enterpriseValue'),
    shares:safe(ks,'sharesOutstanding'),
    revenue:safe(fin,'totalRevenue'), revGrowth:safe(fin,'revenueGrowth'),
    grossMgn:safe(fin,'grossMargins'), ebitdaMgn:safe(fin,'ebitdaMargins'),
    opMgn:safe(fin,'operatingMargins'), netMgn:safe(fin,'profitMargins'),
    ebitda:safe(fin,'ebitda'), opCF:safe(fin,'operatingCashflow'),
    fcf:safe(fin,'freeCashflow'), cash:safe(fin,'totalCash'),
    debt:safe(fin,'totalDebt'), bookVal:safe(ks,'bookValue'),
    eps:safe(ks,'trailingEps'), fwdEps:safe(ks,'forwardEps'),
    divRate:safe(sd,'dividendRate'), divYield:safe(sd,'dividendYield'),
    payoutRatio:safe(ks,'payoutRatio'), beta:safe(ks,'beta'),
    pe:safe(sd,'trailingPE'), fwdPE:safe(sd,'forwardPE'),
    pb:safe(ks,'priceToBook'), ps:safe(ks,'priceToSalesTrailing12Months'),
    evEbitda:safe(ks,'enterpriseToEbitda'), evRev:safe(ks,'enterpriseToRevenue'),
    peg:safe(ks,'pegRatio'),
    cashflows: cf.map(s=>({
      year:s.endDate?.fmt?.slice(0,4),
      opCF:safe(s,'totalCashFromOperatingActivities'),
      capex:safe(s,'capitalExpenditures'),
      fcf:(safe(s,'totalCashFromOperatingActivities')||0)+(safe(s,'capitalExpenditures')||0)
    })).reverse(),
    income: is.map(s=>({
      year:s.endDate?.fmt?.slice(0,4),
      rev:safe(s,'totalRevenue'), ni:safe(s,'netIncome')
    })).reverse(),
    balance: bs.map(s=>({
      year:s.endDate?.fmt?.slice(0,4),
      assets:safe(s,'totalAssets'), liab:safe(s,'totalLiab'),
      equity:safe(s,'totalStockholderEquity')
    })).reverse(),
  };
}

// ── ANALYZE ───────────────────────────────────────────────────────────────────
async function analyze(){
  const t = document.getElementById('tickerInput').value.trim();
  if(!t) return;
  const btn = document.getElementById('analyzeBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  setStatus('Fetching data…','');
  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');

  try{
    D = await fetchStock(t);
    renderAll();
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('statusBar').classList.add('hidden');
  } catch(e){
    setStatus('⚠ '+e.message,'err');
    document.getElementById('emptyState').classList.remove('hidden');
  } finally{
    btn.disabled=false; btn.innerHTML='ANALYSE →';
  }
}

document.getElementById('tickerInput').addEventListener('keydown', e=>{ if(e.key==='Enter') analyze(); });

function setStatus(msg, cls){
  const el=document.getElementById('statusBar');
  el.className='status '+(cls||'');
  el.innerHTML=msg;
  el.classList.remove('hidden');
}

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderPills();
  renderOverview();
  renderDCF();
  renderComps();
  renderDDM();
  renderAssets();
  switchTabById('overview');
}

function switchTabById(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector(`.tab[onclick*="'${name}'"]`)?.classList.add('active');
}

// ── HEADER ────────────────────────────────────────────────────────────────────
function renderHeader(){
  const chgPct = D.changePct ? (D.changePct*100).toFixed(2) : '0.00';
  const up = D.changePct >= 0;
  document.getElementById('coHeader').innerHTML=`
    <div>
      <div class="co-name">${D.name}</div>
      <div class="co-meta">${D.ticker} &middot; ${D.sector} &middot; ${D.industry}</div>
    </div>
    <div class="price-block">
      <div class="cur-price">${fmtP(D.price)}</div>
      <div class="price-chg ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(chgPct)}% today</div>
    </div>`;
}

// ── PILLS ─────────────────────────────────────────────────────────────────────
function renderPills(){
  const netDebt = (D.debt||0)-(D.cash||0);
  const items=[
    ['Market Cap', fmtB(D.marketCap),'ca'],
    ['EV', fmtB(D.ev),'ca'],
    ['Revenue', fmtB(D.revenue),'ca2'],
    ['Free Cash Flow', fmtB(D.fcf),'ca2'],
    ['Net Debt', fmtB(netDebt),'ca4'],
    ['Beta', fmt2(D.beta),'ca4'],
  ];
  document.getElementById('pills').innerHTML=items.map(([l,v,c])=>`
    <div class="pill"><div class="pill-lbl">${l}</div><div class="pill-val ${c}">${v}</div></div>`).join('');
}

// ── SVG BAR CHART ─────────────────────────────────────────────────────────────
function svgBars(data, keys, colors, yFmt){
  if(!data||!data.length) return '<p class="note">No historical data available.</p>';
  const W=560, H=180, PL=54, PR=10, PT=10, PB=28;
  const cW=W-PL-PR, cH=H-PT-PB;
  const n=data.length, bW=Math.floor((cW/n)*0.7/keys.length), gap=Math.floor((cW/n)*0.3);

  const allVals = data.flatMap(d=>keys.map(k=>d[k]||0));
  const minV=Math.min(0,...allVals), maxV=Math.max(...allVals);
  const range=maxV-minV||1;
  const scaleY=v=>(cH - (v-minV)/range*cH);
  const barH=(v)=> Math.abs(v/range*cH);

  let bars='', xLabels='', yLines='';
  for(let i=0;i<5;i++){
    const v=minV+(range/4)*i;
    const y=PT+scaleY(v);
    yLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" class="grid-line"/>`;
    yLines+=`<text x="${PL-4}" y="${y+3}" class="axis-label" text-anchor="end">${yFmt?yFmt(v):fmtB(v)}</text>`;
  }

  data.forEach((d,i)=>{
    const xBase=PL+i*(cW/n)+gap/2;
    keys.forEach((k,ki)=>{
      const v=d[k]||0;
      const x=xBase+ki*(bW+2);
      const h=barH(v);
      const y=v>=0 ? PT+scaleY(v) : PT+scaleY(0);
      bars+=`<rect class="bar-fill" x="${x}" y="${y}" width="${bW}" height="${h}" fill="${colors[ki]}" rx="1"/>`;
    });
    xLabels+=`<text x="${xBase+(bW*keys.length)/2}" y="${H-4}" class="axis-label" text-anchor="middle">${d.year||''}</text>`;
  });

  const legend=keys.map((k,i)=>`<text x="${PL+i*120}" y="${H+14}" class="axis-label" fill="${colors[i]}">■ ${k}</text>`).join('');

  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H+16}" class="chart-svg">
    ${yLines}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" class="axis-line"/>
    <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" class="axis-line"/>
    ${bars}${xLabels}${legend}
  </svg></div>`;
}

function svgLine(data, key, color){
  if(!data||!data.length) return '';
  const W=560,H=160,PL=54,PR=10,PT=10,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const vals=data.map(d=>d[key]||0);
  const minV=Math.min(...vals),maxV=Math.max(...vals),range=maxV-minV||1;
  const sx=(i)=>PL+i*(cW/(data.length-1||1));
  const sy=(v)=>PT+cH-(v-minV)/range*cH;

  let yLines='',pts='',dots='';
  for(let i=0;i<5;i++){
    const v=minV+(range/4)*i; const y=sy(v);
    yLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" class="grid-line"/>`;
    yLines+=`<text x="${PL-4}" y="${y+3}" class="axis-label" text-anchor="end">${fmtP(v)}</text>`;
  }
  data.forEach((d,i)=>{
    if(i>0) pts+=`L${sx(i)},${sy(d[key]||0)}`;
    else pts=`M${sx(0)},${sy(d[key]||0)}`;
    dots+=`<circle cx="${sx(i)}" cy="${sy(d[key]||0)}" r="3" fill="${color}"/>`;
    yLines+=`<text x="${sx(i)}" y="${H-4}" class="axis-label" text-anchor="middle">${d.year||''}</text>`;
  });

  return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" class="chart-svg">
    ${yLines}
    <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" class="axis-line"/>
    <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" class="axis-line"/>
    <path d="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
    ${dots}
  </svg></div>`;
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview(){
  document.getElementById('tab-overview').innerHTML=`
  <div class="g2">
    <div class="card">
      <div class="card-title">Income & Margins</div>
      <table class="dt"><tbody>
        ${rows([
          ['Revenue', fmtB(D.revenue)],
          ['Revenue Growth (YoY)', fmtPct(D.revGrowth)],
          ['Gross Margin', fmtPct(D.grossMgn)],
          ['EBITDA Margin', fmtPct(D.ebitdaMgn)],
          ['Operating Margin', fmtPct(D.opMgn)],
          ['Net Margin', fmtPct(D.netMgn)],
        ])}
      </tbody></table>
    </div>
    <div class="card">
      <div class="card-title">Balance Sheet</div>
      <table class="dt"><tbody>
        ${rows([
          ['Total Cash', fmtB(D.cash)],
          ['Total Debt', fmtB(D.debt)],
          ['Net Debt / (Cash)', fmtB((D.debt||0)-(D.cash||0))],
          ['Book Value / Share', fmtP(D.bookVal)],
          ['Operating Cash Flow', fmtB(D.opCF)],
          ['Free Cash Flow', fmtB(D.fcf)],
        ])}
      </tbody></table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Historical Revenue & Net Income</div>
    ${svgBars(D.income,['rev','ni'],['#47c8ff','#e8ff47'])}
  </div>
  <div class="card">
    <div class="card-title">Historical Free Cash Flow</div>
    ${svgBars(D.cashflows,['opCF','fcf'],['#a78bfa','#e8ff47'])}
  </div>`;
}

function rows(arr){
  return arr.map(([l,v])=>`<tr><td class="lb">${l}</td><td class="nr">${v}</td></tr>`).join('');
}

// ── DCF ───────────────────────────────────────────────────────────────────────
function renderDCF(){
  const el=document.getElementById('tab-dcf');
  el.innerHTML=dcfHTML();
}

function dcfHTML(){
  const res=calcDCF();
  const noFCF = !D.fcf;

  let resultHTML='';
  if(noFCF){
    resultHTML='<div class="status warn">⚠ Free cash flow not available — DCF cannot be computed.</div>';
  } else if(res){
    resultHTML=`
    <div class="vr">
      <div class="vr-lbl">DCF Intrinsic Value / Share</div>
      <div class="vr-price">${fmtP(res.iv)}</div>
      <div class="vr-sub">vs. ${fmtP(D.price)} current &nbsp; ${upsideBadge(res.iv,D.price)}</div>
    </div>
    <div class="card" style="margin-top:14px">
      <div class="card-title">Value Breakdown</div>
      <table class="dt"><tbody>
        <tr><td class="lb">PV of FCFs (10yr)</td><td class="nr">$${fmt2((res.totalPV-res.pvTV)/1e9)}B</td></tr>
        <tr><td class="lb">PV of Terminal Value</td><td class="nr">$${fmt2(res.pvTV/1e9)}B</td></tr>
        <tr class="hl"><td class="lb">Total Equity Value</td><td class="nr">$${fmt2(res.totalPV/1e9)}B</td></tr>
        <tr><td class="lb">Implied / Share</td><td class="nr">${fmtP(res.iv)}</td></tr>
      </tbody></table>
      <p class="note">⚠ Uses LTM FCF as the base. Terminal value typically = 50–70% of total DCF value. Treat assumptions with care.</p>
    </div>`;
  } else {
    resultHTML='<div class="status err">⚠ WACC must exceed terminal growth rate.</div>';
  }

  const chartHTML = res ? `
    <div class="card">
      <div class="card-title">Projected PV of FCF (10 Years, $B)</div>
      ${svgBars(res.cfs,['pv'],['#e8ff47'],(v=>v.toFixed(1)+'B'))}
    </div>` : '';

  return `<div class="g2">
    <div>
      <div class="card">
        <div class="card-title">Assumptions</div>
        <div class="asgrid">
          ${asField('WACC (%)','wacc',0.5)}
          ${asField('Phase 1 FCF Growth (%)','g1',1)}
          ${asField('Phase 1 Years','y1',1)}
          ${asField('Phase 2 FCF Growth (%)','g2',1)}
          ${asField('Terminal Growth (%)','gt',0.1)}
        </div>
        <div class="divider"></div>
        <div class="sec-title">Base Inputs</div>
        <table class="dt"><tbody>
          ${rows([
            ['LTM Free Cash Flow', fmtB(D.fcf)],
            ['Shares Outstanding', fmtB(D.shares)],
            ['Current Price', fmtP(D.price)],
          ])}
        </tbody></table>
        ${resultHTML}
      </div>
    </div>
    <div>${chartHTML}</div>
  </div>`;
}

function calcDCF(){
  const fcf=D.fcf, shares=D.shares;
  if(!fcf||!shares) return null;
  const w=A.wacc/100, g1=A.g1/100, g2=A.g2/100, gt=A.gt/100, y1=parseInt(A.y1);
  if(w<=gt) return null;
  let cf=fcf, totalPV=0, cfs=[];
  for(let i=1;i<=10;i++){
    cf*=(1+(i<=y1?g1:g2));
    const pv=cf/Math.pow(1+w,i);
    totalPV+=pv;
    cfs.push({year:`Y${i}`,pv:pv/1e9});
  }
  const tv=(cf*(1+gt))/(w-gt);
  const pvTV=tv/Math.pow(1+w,10);
  totalPV+=pvTV;
  return {iv:totalPV/shares, totalPV, pvTV, cfs};
}

function asField(label,key,step){
  return `<div class="asfield">
    <label>${label}</label>
    <input type="number" step="${step}" value="${A[key]}" onchange="A['${key}']=parseFloat(this.value)||0;renderDCF();renderDDM();">
  </div>`;
}

// ── COMPS ─────────────────────────────────────────────────────────────────────
const SECTOR_BENCH={
  'Technology':{pe:28,evEb:18,evR:6,pb:8},
  'Healthcare':{pe:22,evEb:14,evR:4,pb:5},
  'Financials':{pe:13,evEb:10,evR:3,pb:1.5},
  'Consumer Cyclical':{pe:20,evEb:12,evR:2,pb:4},
  'Communication Services':{pe:18,evEb:10,evR:3,pb:3},
  'Energy':{pe:12,evEb:7,evR:1.5,pb:2},
  'Industrials':{pe:20,evEb:13,evR:2,pb:4},
  'Consumer Defensive':{pe:22,evEb:14,evR:2,pb:5},
  'Utilities':{pe:18,evEb:11,evR:3,pb:2},
  'Real Estate':{pe:35,evEb:20,evR:8,pb:2},
  'Basic Materials':{pe:16,evEb:10,evR:2,pb:3},
};

function renderComps(){
  const bench=SECTOR_BENCH[D.sector]||{pe:20,evEb:12,evR:3,pb:4};
  const implPE=D.eps&&bench.pe ? D.eps*bench.pe : null;
  const implFwd=D.fwdEps&&bench.pe ? D.fwdEps*bench.pe : null;

  const multData=[
    ['Trailing P/E', D.pe, 'equity'],
    ['Forward P/E', D.fwdPE, 'equity'],
    ['PEG Ratio', D.peg, 'equity'],
    ['Price / Book', D.pb, 'equity'],
    ['Price / Sales', D.ps, 'equity'],
    ['EV / Revenue', D.evRev, 'ev'],
    ['EV / EBITDA', D.evEbitda, 'ev'],
  ];

  const compRows=[
    ['P/E', D.pe, bench.pe],
    ['EV/EBITDA', D.evEbitda, bench.evEb],
    ['EV/Revenue', D.evRev, bench.evR],
    ['P/B', D.pb, bench.pb],
  ];

  document.getElementById('tab-comps').innerHTML=`
  <div class="g2">
    <div class="card">
      <div class="card-title">Trading Multiples</div>
      <table class="dt">
        <thead><tr><th>Multiple</th><th class="nr">Value</th><th class="nr">Type</th></tr></thead>
        <tbody>
          ${multData.map(([l,v,t])=>`<tr>
            <td class="lb">${l}</td>
            <td class="nr">${fmtMx(v)}</td>
            <td class="nr"><span class="badge ${t==='equity'?'bb':'by'}">${t==='equity'?'Equity':'EV'}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="card">
      <div class="card-title">vs. Sector Averages (${D.sector})</div>
      <table class="dt">
        <thead><tr><th>Multiple</th><th class="nr">Company</th><th class="nr">Sector Avg</th></tr></thead>
        <tbody>
          ${compRows.map(([l,co,se])=>{
            const high=co&&se&&co>se;
            return `<tr><td class="lb">${l}</td><td class="nr ${high?'dn':'up'}">${fmtMx(co)}</td><td class="nr">${fmtMx(se)}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
      <p class="note">Sector averages are broad estimates for directional context only. A real comps analysis requires a curated peer set.</p>
    </div>
  </div>
  <div class="g2">
    <div class="card">
      <div class="card-title">Implied Prices — Sector Avg P/E (${fmtMx(bench.pe)})</div>
      ${[['Trailing EPS × Sector P/E', implPE, D.eps],['Forward EPS × Sector P/E', implFwd, D.fwdEps]].map(([label,imp,eps])=>`
        <div style="margin-bottom:18px">
          <div class="vr-lbl">${label}</div>
          ${imp ? `
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)">${fmtP(imp)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:4px">EPS ${fmtP(eps)} × ${fmtMx(bench.pe)} &nbsp; ${upsideBadge(imp,D.price)}</div>
          ` : `<div style="color:var(--muted);font-size:12px">EPS not available</div>`}
        </div>`).join('')}
      <p class="note">Indicative figures only. True comps analysis requires a peer set.</p>
    </div>
    <div class="card">
      <div class="card-title">Key Ratios at a Glance</div>
      ${[
        ['P/E vs Sector', D.pe, bench.pe, 50],
        ['EV/EBITDA vs Sector', D.evEbitda, bench.evEb, 30],
        ['P/B vs Sector', D.pb, bench.pb, 20],
      ].map(([l,v,b,max])=>{
        const pct=v ? Math.min(v/max*100,100) : 0;
        const bpct=b ? Math.min(b/max*100,100) : 0;
        return `<div class="gauge-wrap">
          <div class="gauge-row"><span>${l}</span><span>${fmtMx(v)}</span></div>
          <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%;background:${v>b?'var(--red)':'var(--green)'}"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">Sector avg: ${fmtMx(b)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// ── DDM ───────────────────────────────────────────────────────────────────────
function renderDDM(){
  const el=document.getElementById('tab-ddm');
  el.innerHTML=ddmHTML();
}

function ddmHTML(){
  const hasDiv=D.divRate&&D.divRate>0;
  if(!hasDiv) return `
    <div class="card">
      <div class="card-title">Gordon Growth Model (DDM)</div>
      <div class="status warn" style="margin-bottom:12px">⚠ ${D.name} does not pay a dividend — DDM is not applicable.</div>
      <p class="note">DDM suits mature dividend-paying companies (utilities, consumer staples, large banks). Use DCF or Comps for this stock.</p>
    </div>`;

  const ke=A.ke/100, g=A.dg/100;
  const valid=ke>g;
  const d1=D.divRate*(1+g);
  const val=valid ? d1/(ke-g) : null;

  const growData=Array.from({length:10},(_,i)=>({
    year:`Y${i+1}`, div:D.divRate*Math.pow(1+g,i+1)
  }));

  return `<div class="g2">
    <div>
      <div class="card">
        <div class="card-title">Gordon Growth Model (P = D₁ / Ke − g)</div>
        <table class="dt" style="margin-bottom:14px"><tbody>
          ${rows([
            ['Annual Dividend (D₀)', fmtP(D.divRate)],
            ['Dividend Yield', fmtPct(D.divYield)],
            ['Payout Ratio', fmtPct(D.payoutRatio)],
          ])}
        </tbody></table>
        <div class="asgrid">
          <div class="asfield">
            <label>Cost of Equity / Ke (%)</label>
            <input type="number" step="0.5" value="${A.ke}" onchange="A.ke=parseFloat(this.value)||0;renderDDM();">
          </div>
          <div class="asfield">
            <label>Dividend Growth Rate (%)</label>
            <input type="number" step="0.5" value="${A.dg}" onchange="A.dg=parseFloat(this.value)||0;renderDDM();">
          </div>
        </div>
        ${valid ? `
        <div class="vr">
          <div class="vr-lbl">DDM Intrinsic Value / Share</div>
          <div class="vr-price">${fmtP(val)}</div>
          <div class="vr-sub">D₁ ${fmtP(d1)} / (${(ke*100).toFixed(1)}% − ${(g*100).toFixed(1)}%) &nbsp; ${upsideBadge(val,D.price)}</div>
        </div>` : `<div class="status err">⚠ Ke must be greater than g.</div>`}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Projected Dividend Stream (10yr)</div>
      ${svgLine(growData,'div','#e8ff47')}
      <p class="note">DDM is highly sensitive to the Ke − g spread. A 1% change in either can move the implied value dramatically.</p>
    </div>
  </div>`;
}

// ── ASSETS ────────────────────────────────────────────────────────────────────
function renderAssets(){
  const pb=D.pb, bv=D.bookVal, price=D.price;
  const deRatio=D.debt&&D.bookVal&&D.shares ? D.debt/(D.bookVal*D.shares) : null;
  const cashRatio=D.cash&&D.marketCap ? D.cash/D.marketCap : null;

  document.getElementById('tab-assets').innerHTML=`
  <div class="g2">
    <div class="card">
      <div class="card-title">Book Value / NAV Analysis</div>
      <table class="dt"><tbody>
        ${rows([
          ['Book Value / Share', fmtP(D.bookVal)],
          ['Current Price', fmtP(D.price)],
          ['Price-to-Book (P/B)', fmtMx(D.pb)],
          ['Total Cash', fmtB(D.cash)],
          ['Total Debt', fmtB(D.debt)],
          ['Net Cash / (Debt)', fmtB((D.cash||0)-(D.debt||0))],
        ])}
      </tbody></table>
      ${bv ? `
      <div class="vr">
        <div class="vr-lbl">Book Value / Share</div>
        <div class="vr-price">${fmtP(bv)}</div>
        <div class="vr-sub">${upsideBadge(bv,price)} &nbsp; Trading at ${fmtMx(pb)} book</div>
      </div>` : ''}
      <p class="note">Book value is most meaningful for financials, real estate, and capital-heavy industries. Asset-light and tech companies carry significant intangibles off balance sheet, making P/B less informative.</p>
    </div>
    <div>
      <div class="card">
        <div class="card-title">Leverage & Liquidity</div>
        ${deRatio!=null ? `<div class="gauge-wrap">
          <div class="gauge-row"><span style="font-size:11px;color:var(--muted)">Debt / Equity</span><span style="font-size:11px">${(deRatio*100).toFixed(1)}%</span></div>
          <div class="gauge-track"><div class="gauge-fill" style="width:${Math.min(deRatio*100,100)}%;background:var(--red)"></div></div>
        </div>` : ''}
        ${cashRatio!=null ? `<div class="gauge-wrap" style="margin-top:10px">
          <div class="gauge-row"><span style="font-size:11px;color:var(--muted)">Cash / Market Cap</span><span style="font-size:11px">${(cashRatio*100).toFixed(1)}%</span></div>
          <div class="gauge-track"><div class="gauge-fill" style="width:${Math.min(cashRatio*100,100)}%;background:var(--green)"></div></div>
        </div>` : ''}
      </div>
      <div class="card">
        <div class="card-title">Assets vs Liabilities vs Equity</div>
        ${svgBars(D.balance,['assets','liab','equity'],['#47c8ff','#f87171','#e8ff47'])}
      </div>
    </div>
  </div>`;
}
</script>
